<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>管理员登录 | SmartShop</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/dark.css" />
    <style>
      .login-card {
        max-width: 400px;
        margin: 80px auto;
        background: var(--color-surface);
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
        padding: 32px;
        box-shadow: var(--shadow-lg);
      }
      .login-title {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 24px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="main-content">
      <div class="container">
        <div class="login-card">
          <h1 class="login-title">🔐 管理员登录</h1>
          <form id="login-form">
            <div class="form-group">
              <label for="email">邮箱</label>
              <input id="email" name="email" type="email" required placeholder="kapkaz595@example.com" autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="password">密码</label>
              <input id="password" name="password" type="password" required placeholder="请输入密码" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
          </form>
        </div>
      </div>
    </main>

    <script type="module">
      import { login } from '../js/admin.js';
      document.getElementById('login-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const success = await login(formData.get('email'), formData.get('password'));
        if (success) {
          window.location.href = 'dashboard.html';
        }
      });
    </script>
  </body>
</html>
