<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>后台管理 | SmartShop</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/dark.css" />
    <style>
      .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
      .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
      .admin-table th { background: var(--color-bg); font-weight: 700; }
      .admin-section { margin-bottom: 40px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="../index.html" class="brand">
            <div class="brand-logo">⚙️</div>
            <div class="brand-text">
              <h1 class="brand-name">SmartShop</h1>
              <p class="brand-slogan">后台管理</p>
            </div>
          </a>
          <div class="header-actions">
            <button id="logout-btn" type="button" class="btn btn-secondary">退出登录</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="page-section container">
        <h2 class="page-title">📦 商品管理</h2>
        <div class="admin-section">
          <!-- 💡 移除了原本的 onclick 弹窗，加上了 id 方便在脚本中控制跳转 -->
          <button id="add-product-btn" type="button" class="btn btn-primary">+ 新增商品</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>图片</th>
                <th>名称</th>
                <th>分类</th>
                <th>价格</th>
                <th>库存</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="admin-product-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module">
      import { checkAdmin, logout, renderAdminProducts } from '../js/admin.js';

      // 1. 拦截未登录用户
      async function initDashboard() {
        const isAdmin = await checkAdmin();
        if (!isAdmin) {
          window.location.href = 'login.html';
          return;
        }

        // 2. 绑定退出登录事件
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await logout();
          window.location.href = 'login.html';
        });

        // 3. 【彻底修复】利用原生 URL 动态获取并计算绝对路径，完美防御本地与线上 GitHub Pages 的 404
        document.getElementById('add-product-btn').addEventListener('click', () => {
          const targetUrl = new URL('product-edit.html', window.location.href).href;
          window.location.href = targetUrl;
        });

        // 4. 渲染来自于 Supabase 的真实商品数据
        renderAdminProducts();
      }

      // 启动页面
      initDashboard();
    </script>
  </body>
</html>
