<!DOCTYPE html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Басқару панелі | SmartShop</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/dark.css" />
    <style>
      .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
      .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
      .admin-table th { background: var(--color-bg); font-weight: 700; }
      .admin-section { margin-bottom: 40px; }
      .admin-lang-picker select {
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="../index.html" class="brand">
            <div class="brand-logo">⚙️</div>
            <div class="brand-text">
              <h1 class="brand-name">SmartShop</h1>
              <p class="brand-slogan" data-i18n="adminPanel">Басқару панелі</p>
            </div>
          </a>
          <div class="header-actions">
            <div class="admin-lang-picker">
              <select id="admin-lang-select" aria-label="Language Selector">
                <option value="kk">Қазақша</option>
                <option value="ru">Русский</option>
              </select>
            </div>
            <button id="logout-btn" type="button" class="btn btn-secondary" data-i18n="logoutButton">Шығу</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="page-section container">
        <h2 class="page-title" data-i18n="productManagement">📦 Тауарларды басқару</h2>
        <div class="admin-section">
          <button id="add-product-btn" type="button" class="btn btn-primary" data-i18n="addProductBtn">+ Жаңа тауар қосу</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th data-i18n="colImage">Сурет</th>
                <th data-i18n="colName">Атауы</th>
                <th data-i18n="colCategory">Санат</th>
                <th data-i18n="colPrice">Бағасы</th>
                <th data-i18n="colStock">Қалдық</th>
                <th data-i18n="colStatus">Күйі</th>
                <th data-i18n="colActions">Әрекет</th>
              </tr>
            </thead>
            <tbody id="admin-product-list"></tbody>
          </table>
        </div>
      </section>

      <section class="page-section container">
        <h2 class="page-title">📋 Заказдарды басқару</h2>
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Нөмірі</th>
                <th>Уақыты</th>
                <th>Клиент</th>
                <th>Тауарлар</th>
                <th>Сома</th>
                <th>Күйі</th>
                <th>Әрекет</th>
              </tr>
            </thead>
            <tbody id="admin-order-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module">
      import { checkAdmin, logout, renderAdminProducts, renderAdminOrders } from '../js/admin.js';
      import { initLanguage, setLanguage, getLanguage } from '../js/language.js';

      initLanguage();
      const langSelect = document.getElementById('admin-lang-select');
      langSelect.value = getLanguage();
      if (!['kk', 'ru'].includes(langSelect.value)) {
        langSelect.value = 'kk';
      }
      langSelect.addEventListener('change', (e) => {
        setLanguage(e.target.value);
      });

      async function initDashboard() {
        const isAdmin = await checkAdmin();
        if (!isAdmin) {
          window.location.href = 'login.html';
          return;
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
          await logout();
          window.location.href = 'login.html';
        });

        document.getElementById('add-product-btn').addEventListener('click', () => {
          const targetUrl = new URL('product-edit.html', window.location.href).href;
          window.location.href = targetUrl;
        });

        renderAdminProducts();
        renderAdminOrders();
      }

      initDashboard();
    </script>
  </body>
</html>
