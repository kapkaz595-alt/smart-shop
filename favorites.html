<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>我的收藏 | 阳光便利店 | SmartShop</title>
    <meta name="description" content="我的收藏 — 查看已收藏的商品。" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ff7a1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/dark.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="index.html" class="brand">
            <div class="brand-logo">☀️</div>
            <div class="brand-text">
              <h1 class="brand-name">阳光便利店</h1>
              <p class="brand-slogan">我的收藏</p>
            </div>
          </a>
          <div class="header-actions">
            <button id="cart-btn" class="icon-btn" aria-label="购物车">
              🛒
              <span class="badge" hidden>0</span>
            </button>
            <button id="orders-btn" class="icon-btn" aria-label="订单">📋</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="page-section container">
        <h2 class="page-title">❤️ 我的收藏</h2>
        <p id="empty-state" class="empty-state" hidden>还没有收藏任何商品。</p>
        <div id="favorites-grid" class="product-grid"></div>
      </section>
    </main>

    <div id="product-modal" class="modal-overlay" hidden>
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" class="modal-close" aria-label="关闭">&times;</button>
        <div class="modal-image-wrap">
          <img id="modal-image" class="modal-image" src="" alt="" />
        </div>
        <div id="modal-gallery" class="modal-gallery"></div>
        <div class="modal-body">
          <span id="modal-category" class="modal-category"></span>
          <h3 id="modal-title" class="modal-title"></h3>
          <p id="modal-brand" class="modal-brand"></p>
          <div class="modal-price-row">
            <span id="modal-price" class="modal-price"></span>
            <span id="modal-original-price" class="modal-original-price"></span>
            <span id="modal-discount" class="modal-discount"></span>
          </div>
          <p id="modal-stock" class="modal-stock"></p>
          <div id="modal-meta" class="modal-meta-grid"></div>
          <div class="modal-desc">
            <h4 class="modal-subtitle">商品介绍</h4>
            <p id="modal-desc"></p>
          </div>
          <div id="modal-features" class="modal-features"></div>
          <div class="modal-actions">
            <button id="modal-favorite" type="button" class="modal-btn secondary">🤍 收藏</button>
            <button id="modal-add-cart" type="button" class="modal-btn primary">🛒 加入购物车</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-content">
        <div class="footer-block">
          <h4>店铺信息</h4>
          <p>阳光便利店</p>
          <p>📍 某某市幸福路 88 号</p>
          <p>☎ 138-0000-0000</p>
        </div>
        <div class="footer-block">
          <h4>快速链接</h4>
          <a href="index.html" class="footer-link">首页</a>
          <a href="products.html" class="footer-link">全部商品</a>
          <a href="cart.html" class="footer-link">购物车</a>
          <a href="orders.html" class="footer-link">我的订单</a>
        </div>
      </div>
      <p class="footer-copyright">&copy; 2026 阳光便利店 SmartShop. 保留所有权利。</p>
    </footer>

    <script type="module" src="js/favorites-page.js"></script>
  </body>
</html>
