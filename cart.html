<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>购物车 | 阳光便利店 | SmartShop</title>
    <meta name="description" content="购物车 — 查看已选商品、修改数量、提交订单。" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ff7a1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/dark.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="index.html" class="brand">
            <div class="brand-logo">☀️</div>
            <div class="brand-text">
              <h1 class="brand-name">阳光便利店</h1>
              <p class="brand-slogan">购物车</p>
            </div>
          </a>
          <div class="header-actions">
            <button id="favorites-btn" class="icon-btn" aria-label="收藏">❤️</button>
            <button id="cart-btn" class="icon-btn" aria-label="购物车">
              🛒
              <span class="badge" hidden>0</span>
            </button>
            <button id="orders-btn" class="icon-btn" aria-label="订单">📋</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="page-section container">
        <h2 class="page-title">🛒 购物车</h2>
        <div id="cart-list"></div>

        <div class="cart-summary">
          <div>
            <p class="cart-total">合计：<strong id="cart-total">0 坚戈</strong></p>
            <p id="cart-count" class="section-count">0 件商品</p>
          </div>
          <div class="cart-actions">
            <button id="clear-cart-btn" type="button" class="btn btn-secondary">清空购物车</button>
            <a href="#order-form" class="btn btn-primary">去结算</a>
          </div>
        </div>

        <form id="order-form" class="order-form">
          <h3 class="modal-subtitle">提交订单</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="customerName">顾客姓名</label>
              <input id="customerName" name="customerName" type="text" required placeholder="请输入姓名" />
            </div>
            <div class="form-group">
              <label for="phone">联系电话</label>
              <input id="phone" name="phone" type="tel" required placeholder="请输入手机号" />
            </div>
          </div>
          <div class="form-group">
            <label for="deliveryType">取货方式</label>
            <select id="deliveryType" name="deliveryType">
              <option value="self">到店自提</option>
              <option value="delivery">配送到家</option>
            </select>
          </div>
          <div class="form-group">
            <label for="note">备注</label>
            <textarea id="note" name="note" rows="3" placeholder="例如：不要辣、送到小区门口..."></textarea>
          </div>
          <button id="submit-order-btn" type="button" class="btn btn-primary btn-block">提交订单</button>
        </form>

        <div id="kaspi-qr-section" class="order-form" hidden>
          <h3 class="modal-subtitle">💳 扫码支付</h3>
          <p style="color:var(--color-ink-soft);font-size:14px;margin-bottom:12px;">
            订单已发送到店主 WhatsApp，请使用 Kaspi App 扫码付款，付款后在 WhatsApp 上告知店主。
          </p>
          <img src="https://placehold.co/300x300?text=Kaspi+QR" alt="Kaspi收款二维码" style="width:240px;border-radius:12px;margin:0 auto;display:block;" />
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <div class="footer-block">
          <h4>店铺信息</h4>
          <p>阳光便利店</p>
          <p>📍 某某市幸福路 88 号</p>
          <p>☎ 138-0000-0000</p>
        </div>
        <div class="footer-block">
          <h4>快速链接</h4>
          <a href="index.html" class="footer-link">首页</a>
          <a href="products.html" class="footer-link">全部商品</a>
          <a href="favorites.html" class="footer-link">我的收藏</a>
          <a href="orders.html" class="footer-link">我的订单</a>
        </div>
      </div>
      <p class="footer-copyright">&copy; 2026 阳光便利店 SmartShop. 保留所有权利。</p>
    </footer>

    <script type="module" src="js/cart-page.js"></script>
  </body>
</html>
