<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title data-i18n="shopTitle">阳光便利店 | SmartShop</title>
    <meta name="description" content="阳光便利店数字货架 — 扫码即可浏览商品、加入购物车、收藏、查看优惠。" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="阳光便利店 | SmartShop" />
    <meta property="og:description" content="阳光便利店数字货架 — 扫码即可浏览商品、加入购物车、收藏、查看优惠。" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#ff7a1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/dark.css" />
  </head>
  <body>
    <!-- 公告栏 -->
    <div class="announcement-bar">
      <div class="container">
        <div id="announcement-track" class="announcement-track">
          <!-- 公告由 JS 动态渲染 -->
        </div>
      </div>
    </div>

    <!-- 页头 -->
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="index.html" class="brand">
            <div id="shop-logo" class="brand-logo" aria-hidden="true">☀️</div>
            <div class="brand-text">
              <h1 id="shop-name" class="brand-name" data-i18n="shopName">阳光便利店</h1>
              <p id="shop-slogan" class="brand-slogan" data-i18n="shopSlogan">家门口的数字货架</p>
            </div>
          </a>

          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <label for="search-input" class="visually-hidden" data-i18n="searchPlaceholder">搜索商品</label>
            <input id="search-input" type="search" class="search-input" placeholder="搜索商品、品牌、分类..." data-i18n-placeholder="searchPlaceholder" autocomplete="off" />
            <div id="search-history" class="search-history"></div>
          </div>

          <div class="header-info">
            <p id="shop-phone" class="info-line"><span class="info-icon">☎</span> 138-0000-0000</p>
            <p id="shop-hours" class="info-line"><span class="info-icon">🕒</span> 每天 09:00 - 22:00</p>
            <p id="shop-address" class="info-line"><span class="info-icon">📍</span> 某某市幸福路 88 号</p>
          </div>

          <div class="header-actions">
            <button id="favorites-btn" class="icon-btn" aria-label="收藏" data-i18n-label="favorite">❤️</button>
            <button id="cart-btn" class="icon-btn" aria-label="购物车" data-i18n-label="cart">
              🛒
              <span class="badge" hidden>0</span>
            </button>
            <button id="orders-btn" class="icon-btn" aria-label="订单" data-i18n-label="orders">📋</button>
            <button id="admin-btn" class="icon-btn" aria-label="管理" data-i18n-label="admin">⚙️</button>

            <!-- 多语言切换胶囊 -->
            <div class="top-lang-picker">
              <select id="lang-select" aria-label="Language Selector">
                <option value="kk">Қазақша</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="zh-CN">中文</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <nav class="category-nav" aria-label="商品分类">
        <div class="container">
          <ul id="category-list" class="category-list">
            <!-- 分类由 JS 渲染 -->
          </ul>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <!-- 轮播广告、优惠、新品等其他内容不变，直接保留原样即可 -->
      <!-- (此处省略部分代码，复制时请保留您原有的主体内容) -->
      
      <!-- 这里仅展示关键的标签结构，确保它们带有 data-i18n 属性 -->
      <section id="promotions" class="section-promotions container section-container">
        <div class="section-header">
          <h2 class="section-title" data-i18n="promotionsSection">🔥 优惠专区</h2>
          <a href="products.html" class="view-all-link" data-i18n="viewAll">查看全部 →</a>
        </div>
        <p class="empty-state" data-i18n="emptyState" hidden>暂无促销商品。</p>
        <div id="promotions-grid" class="product-grid"></div>
      </section>

      <!-- ... 其余页面代码 ... -->

    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
      <div class="container footer-content">
        <div class="footer-block">
          <h4 data-i18n="shopInfo">店铺信息</h4>
          <p id="footer-name" data-i18n="shopName">阳光便利店</p>
          <p id="shop-address-footer">📍 某某市幸福路 88 号</p>
          <p id="shop-phone-footer">☎ 138-0000-0000</p>
          <p id="shop-hours-footer">🕒 每天 09:00 - 22:00</p>
        </div>
        <div class="footer-block">
          <h4 data-i18n="quickContact">快速联系</h4>
          <a id="shop-whatsapp" class="footer-link" href="#" target="_blank">WhatsApp</a>
          <a id="shop-telegram" class="footer-link" href="#" target="_blank">Telegram</a>
          <a id="shop-map" class="footer-link" href="#" target="_blank" data-i18n="googleMapNav">Google Map 导航</a>
        </div>
      </div>
      <p class="footer-copyright">&copy; 2026 <span id="footer-copyright-name" data-i18n="shopName">阳光便利店</span> SmartShop. <span data-i18n="allRightsReserved">保留所有权利。</span></p>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
