<!DOCTYPE html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Барлық тауарлар | E-DUKEN | SmartShop</title>
    <meta name="description" content="浏览阳光便利店的全部商品，按分类筛选、搜索、查看详情。" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ff7a1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/dark.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="index.html" class="brand">
            <div id="shop-logo" class="brand-logo">☀️</div>
            <div class="brand-text">
              <h1 id="shop-name" class="brand-name">E-DUKEN</h1>
              <p class="brand-slogan">Барлық тауарлар</p>
            </div>
          </a>

          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input id="search-input" type="search" class="search-input" placeholder="搜索商品、品牌、分类..." autocomplete="off" />
            <div id="search-history" class="search-history"></div>
          </div>

          <div class="header-actions">
            <button id="favorites-btn" class="icon-btn" aria-label="收藏">❤️</button>
            <button id="cart-btn" class="icon-btn" aria-label="购物车">
              🛒
              <span class="badge" hidden>0</span>
            </button>
            <button id="orders-btn" class="icon-btn" aria-label="订单">📋</button>
            <button id="admin-btn" class="icon-btn" aria-label="管理">⚙️</button>
          </div>
        </div>
      </div>

      <nav class="category-nav" aria-label="商品分类">
        <div class="container">
          <ul id="category-list" class="category-list"></ul>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <section class="page-section container">
        <div class="section-header">
          <h2 id="section-title" class="section-title">全部商品</h2>
          <p id="result-count" class="section-count"></p>
        </div>
        <p id="empty-state" class="empty-state" hidden>没有找到相关商品，换个关键词试试吧。</p>
        <div id="product-grid" class="product-grid"></div>
      </section>
    </main>

    <div id="product-modal" class="modal-overlay" hidden>
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button id="modal-close" class="modal-close" aria-label="关闭">&times;</button>
        <div class="modal-image-wrap">
          <img id="modal-image" class="modal-image" src="" alt="" />
        </div>
        <div id="modal-gallery" class="modal-gallery"></div>
        <div class="modal-body">
          <span id="modal-category" class="modal-category"></span>
          <h3 id="modal-title" class="modal-title"></h3>
          <p id="modal-brand" class="modal-brand"></p>
          <div class="modal-price-row">
            <span id="modal-price" class="modal-price"></span>
            <span id="modal-original-price" class="modal-original-price"></span>
            <span id="modal-discount" class="modal-discount"></span>
          </div>
          <p id="modal-stock" class="modal-stock"></p>
          <div id="modal-meta" class="modal-meta-grid"></div>
          <div class="modal-desc">
            <h4 class="modal-subtitle">商品介绍</h4>
            <p id="modal-desc"></p>
          </div>
          <div id="modal-features" class="modal-features"></div>
          <div class="modal-actions">
            <button id="modal-favorite" type="button" class="modal-btn secondary">🤍 收藏</button>
            <button id="modal-add-cart" type="button" class="modal-btn primary">🛒 加入购物车</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container footer-content">
        <div class="footer-block">
          <h4>Дүкен туралы ақпарат</h4>
          <p id="footer-name">E-DUKEN</p>
          <p id="shop-address-footer">📍 Астана қаласы кенесары 221/1</p>
          <p id="shop-phone-footer">☎ 138-0000-0000</p>
          <p id="shop-hours-footer">🕒  09:00 - 22:00</p>
        </div>
        <div class="footer-block">
          <h4>快速联系</h4>
          <a id="shop-whatsapp" class="footer-link" href="#" target="_blank">WhatsApp</a>
          <a id="shop-telegram" class="footer-link" href="#" target="_blank">Telegram</a>
          <a id="shop-map" class="footer-link" href="#" target="_blank">Google Map</a>
        </div>
      </div>
      <p class="footer-copyright">&copy; © 2026 Alem Studio. All Rights Reserved.</p>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
